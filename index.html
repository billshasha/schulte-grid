<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>舒尔特方格训练</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
            font-size: 28px;
        }

        .settings {
            margin-bottom: 20px;
            text-align: center;
        }

        .settings label {
            margin-right: 15px;
            font-size: 16px;
            color: #555;
        }

        .settings select {
            padding: 8px 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }

        .timer {
            text-align: center;
            font-size: 48px;
            font-weight: bold;
            color: #667eea;
            margin: 20px 0;
            font-family: 'Courier New', monospace;
        }

        .grid {
            display: grid;
            gap: 8px;
            margin: 20px 0;
            justify-content: center;
        }

        .cell {
            width: 70px;
            height: 70px;
            border: none;
            border-radius: 12px;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            background: #f0f0f0;
            color: #333;
            transition: all 0.2s;
        }

        .cell:hover {
            background: #e0e0e0;
        }

        .cell.correct {
            background: #4ade80;
            color: white;
            pointer-events: none;
        }

        .cell.wrong {
            background: #f87171;
            color: white;
            animation: shake 0.3s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
        }

        button {
            padding: 12px 30px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            color: white;
        }

        .start-btn {
            background: linear-gradient(145deg, #667eea, #764ba2);
        }

        .reset-btn {
            background: linear-gradient(145deg, #f59e0b, #d97706);
        }

        .result {
            text-align: center;
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            background: #f0f9ff;
            display: none;
        }

        .result.show {
            display: block;
        }

        .result h2 {
            color: #0891b2;
            margin-bottom: 10px;
        }

        .result p {
            color: #555;
            font-size: 18px;
            margin: 5px 0;
        }

        .next-number {
            text-align: center;
            font-size: 20px;
